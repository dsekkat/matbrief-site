<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatBrief — Bulletin quotidien des matières premières plastiques</title>
<meta name="description" content="MatBrief — le bulletin quotidien des prix des matières premières plastiques pour le marché marocain. PVC, polyéthylène, plastifiants : prix par origine, fret, douane et prévisions.">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111;
    --orange: #e8541f;
    --muted: #6b7686;
    --hairline: #ececf0;
    --hairline-strong: #e2e4ea;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: radial-gradient(1100px 620px at 50% -8%, #fbfbfd 0%, #ffffff 62%);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 64px 24px;
  }
  main > div {
    animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(9px); }
    to   { opacity: 1; transform: none; }
  }
  .logo {
    font-weight: 800;
    font-size: clamp(50px, 8.5vw, 82px);
    letter-spacing: -0.038em;
    line-height: 0.98;
    color: var(--ink);
  }
  .logo .dot { color: var(--orange); }
  .tagline {
    margin-top: 15px;
    font-size: clamp(10.5px, 1.4vw, 12.5px);
    font-weight: 600;
    letter-spacing: 0.46em;
    text-indent: 0.46em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .rule {
    width: 40px;
    height: 2px;
    background: var(--orange);
    border-radius: 2px;
    margin: 34px auto 32px;
  }
  .construction {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
    border: 1px solid var(--hairline-strong);
    border-radius: 999px;
    padding: 12px 22px;
    background: #ffffff;
    box-shadow: 0 1px 2px rgba(17, 17, 17, 0.04), 0 8px 24px rgba(17, 17, 17, 0.045);
  }
  .construction svg { display: block; flex: none; width: 20px; height: 20px; }
  .contact {
    margin-top: 40px;
    font-size: 14.5px;
    color: var(--muted);
    letter-spacing: 0.01em;
  }
  .contact a {
    color: var(--ink);
    font-weight: 600;
    text-decoration: none;
    border-bottom: 1.5px solid var(--orange);
    padding-bottom: 1px;
    transition: color 0.15s ease;
  }
  .contact a:hover { color: var(--orange); }
  footer {
    border-top: 1px solid var(--hairline);
    padding: 22px 24px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<main>
  <div>
    <div class="logo">MatBrief<span class="dot">.</span></div>
    <div class="tagline">Bulletin quotidien</div>
    <div class="rule"></div>
    <div class="construction">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M14.7 6.3a4.5 4.5 0 0 0-5.9 5.6L3.3 17.4a1.9 1.9 0 0 0 0 2.7l.6.6a1.9 1.9 0 0 0 2.7 0l5.5-5.5a4.5 4.5 0 0 0 5.6-5.9l-2.8 2.8-2.5-.6-.6-2.5 2.9-2.7z" stroke="#e8541f" stroke-width="1.8" stroke-linejoin="round"/>
      </svg>
      Site en construction
    </div>
    <p class="contact">
      Contact&nbsp;: <a href="mailto:dsekkat@matbrief.com">dsekkat@matbrief.com</a>
    </p>
  </div>
</main>
<footer>
  © 2026 MatBrief — Casablanca, Maroc
</footer>
</body>
</html>
